name: Trigger IG Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Azure DevOps pipeline
        run: |
          az devops configure --defaults organization="$ADO_ORGANIZATION" project="$ADO_PROJECT"

          PIPELINE_ID=$(az pipelines list --name "$ADO_PIPELINE_NAME" --query "[0].id" -o tsv)

          if [ -z "$PIPELINE_ID" ]; then
            echo "::error::Pipeline '$ADO_PIPELINE_NAME' not found"
            exit 1
          fi

          echo "Triggering pipeline '$ADO_PIPELINE_NAME' (ID: $PIPELINE_ID)..."
          az pipelines run --id "$PIPELINE_ID"
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORGANIZATION: ${{ vars.ADO_ORGANIZATION }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_PIPELINE_NAME: ${{ vars.ADO_PIPELINE_NAME }}
