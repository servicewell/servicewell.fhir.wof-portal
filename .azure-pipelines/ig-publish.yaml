trigger: none

resources:
  repositories:
    - repository: PublishTemplate
      name: swts/servicewell.fhir.landingzone
      type: git
      ref: refs/heads/task/el/build-agent
      endpoint: cross-project-connection
    - repository: IGSource
      type: github
      name: servicewell/servicewell.fhir.wof-portal
      endpoint: IG Github Connection

pool:
  name: 'Implementation Guide Build Pool'

jobs:
  - job: SetupPublish
    steps:
      - checkout: IGSource
        persistCredentials: true

      - script: |
          ORG=$(awk -F': *' '/^id:/{print $2; exit}' $(Build.SourcesDirectory)/sushi-config.yaml | cut -d'.' -f1)
          if [ -z "$ORG" ]; then
            echo "Unable to detect organization from sushi-config.yaml id" >&2
            exit 1
          fi
          echo "##vso[task.setvariable variable=org]$ORG"
        displayName: Detect organization from sushi-config

      - template: ".azure-pipelines/publish-template/ig-publish-template.yaml@PublishTemplate"
        parameters:
          organization: $(org)